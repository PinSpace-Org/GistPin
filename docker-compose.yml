version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: gistpin
      POSTGRES_PASSWORD: gistpin
      POSTGRES_DB: gistpin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gistpin -d gistpin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: gistpin
      DATABASE_PASSWORD: gistpin
      DATABASE_NAME: gistpin
    volumes:
      - ./Backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
