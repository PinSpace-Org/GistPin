name: Mobile Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'Frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'Frontend/**'
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Version bump type (patch/minor/major)'
        required: false
        default: 'patch'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        run: bash infrastructure/ci/scripts/build-android.sh bump ${{ github.event.inputs.bump_version }}

      - name: Build Android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: bash infrastructure/ci/scripts/build-android.sh build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_id }}
          path: android/app/build/outputs/apk/release/*.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        run: bash infrastructure/ci/scripts/build-ios.sh bump ${{ github.event.inputs.bump_version }}

      - name: Build iOS
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash infrastructure/ci/scripts/build-ios.sh build

      - name: Upload to TestFlight
        if: github.ref == 'refs/heads/main'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: bash infrastructure/ci/scripts/build-ios.sh upload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_id }}
          path: ios/build/*.ipa
