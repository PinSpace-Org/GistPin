apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: migration-runner
        image: postgres:15
        command: ["echo", "Running database migrations... Done!"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
      restartPolicy: OnFailure
  backoffLimit: 4