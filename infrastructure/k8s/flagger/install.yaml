---
# Flagger install — uses the official Helm-rendered manifest approach.
# This installs Flagger v1.37 with Istio as the mesh provider and
# Prometheus for metric analysis.
#
# Apply: kubectl apply -f install.yaml
# Verify: kubectl -n flagger-system rollout status deployment/flagger

apiVersion: v1
kind: Namespace
metadata:
  name: flagger-system
  labels:
    app.kubernetes.io/name: flagger
---
# ClusterRole — Flagger needs broad read/write access to manage Canary CRDs
# and traffic-splitting resources across namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flagger
  labels:
    app.kubernetes.io/name: flagger
rules:
  - apiGroups: [""]
    resources: ["events", "configmaps", "secrets", "services", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["flagger.app"]
    resources: ["canaries", "canaries/status", "metrictemplates", "alertproviders"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["networking.istio.io"]
    resources: ["destinationrules", "virtualservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flagger
  labels:
    app.kubernetes.io/name: flagger
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flagger
subjects:
  - kind: ServiceAccount
    name: flagger
    namespace: flagger-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flagger
  namespace: flagger-system
  labels:
    app.kubernetes.io/name: flagger
---
# Flagger Canary CRD (abbreviated — production installs use official CRD bundle)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: canaries.flagger.app
  labels:
    app.kubernetes.io/name: flagger
spec:
  group: flagger.app
  names:
    kind: Canary
    plural: canaries
    singular: canary
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: metrictemplates.flagger.app
  labels:
    app.kubernetes.io/name: flagger
spec:
  group: flagger.app
  names:
    kind: MetricTemplate
    plural: metrictemplates
    singular: metrictemplate
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alertproviders.flagger.app
  labels:
    app.kubernetes.io/name: flagger
spec:
  group: flagger.app
  names:
    kind: AlertProvider
    plural: alertproviders
    singular: alertprovider
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
---
# Flagger Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagger
  namespace: flagger-system
  labels:
    app.kubernetes.io/name: flagger
    app.kubernetes.io/version: "1.37.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flagger
  template:
    metadata:
      labels:
        app: flagger
    spec:
      serviceAccountName: flagger
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: flagger
          image: ghcr.io/fluxcd/flagger:1.37.0
          imagePullPolicy: IfNotPresent
          args:
            - -mesh-provider=istio
            - -metrics-server=http://prometheus.monitoring:9090
            - -log-level=info
            - -namespace=gistpin
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
# Slack alert provider (optional — set SLACK_URL secret to enable)
apiVersion: flagger.app/v1beta1
kind: AlertProvider
metadata:
  name: slack
  namespace: gistpin
spec:
  type: slack
  channel: "#deployments"
  username: flagger
  secretRef:
    name: flagger-slack-url
