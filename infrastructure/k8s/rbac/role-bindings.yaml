apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: gistpin-prod
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: gistpin-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backend-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-rolebinding
  namespace: gistpin-prod
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: gistpin-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: frontend-role
