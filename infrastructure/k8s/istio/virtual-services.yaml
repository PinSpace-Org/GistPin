---
# ──────────────────────────────────────────────────────────────────────────────
# GistPin — Virtual Services
#
# Defines L7 routing, retries, timeouts, fault injection guards, and
# canary / traffic-split rules for each service in the mesh.
# ──────────────────────────────────────────────────────────────────────────────

# ── Backend API ───────────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: backend
  namespace: gistpin
spec:
  hosts:
    - backend               # K8s Service name (cluster-internal)
    - api.gistpin.io        # External host via Gateway
  gateways:
    - gistpin-gateway       # Applies to external ingress
    - mesh                  # Also applies to internal east-west traffic
  http:
    # ── Health / readiness bypass (no retries needed) ────────────────────────
    - match:
        - uri:
            prefix: /health
      route:
        - destination:
            host: backend
            subset: stable
      timeout: 5s

    # ── Canary split — route 10 % of API traffic to canary subset ────────────
    # Flip canary weight to 100 / stable to 0 after validation, then remove.
    - match:
        - uri:
            prefix: /api
      route:
        - destination:
            host: backend
            subset: stable
          weight: 90
        - destination:
            host: backend
            subset: canary
          weight: 10
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,retriable-4xx

    # ── WebSocket upgrade for real-time gist streams ─────────────────────────
    - match:
        - uri:
            prefix: /ws
          headers:
            upgrade:
              exact: websocket
      route:
        - destination:
            host: backend
            subset: stable
      timeout: 0s   # Disable timeout for long-lived WS connections

    # ── Default catch-all ────────────────────────────────────────────────────
    - route:
        - destination:
            host: backend
            subset: stable
      timeout: 30s

---
# ── Frontend ──────────────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: frontend
  namespace: gistpin
spec:
  hosts:
    - frontend
    - gistpin.io
    - www.gistpin.io
  gateways:
    - gistpin-gateway
    - mesh
  http:
    # ── Static assets — aggressive caching headers (handled upstream) ────────
    - match:
        - uri:
            prefix: /static
      route:
        - destination:
            host: frontend
            subset: stable
      timeout: 10s

    # ── Canary split — 5 % of users see new frontend build ───────────────────
    - route:
        - destination:
            host: frontend
            subset: stable
          weight: 95
        - destination:
            host: frontend
            subset: canary
          weight: 5
      timeout: 15s
      retries:
        attempts: 2
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure

---
# ── Analytics ─────────────────────────────────────────────────────────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: analytics
  namespace: gistpin
spec:
  hosts:
    - analytics
    - analytics.gistpin.io
  gateways:
    - gistpin-gateway
    - mesh
  http:
    # ── Ingestion endpoint — high-throughput, low timeout ────────────────────
    - match:
        - uri:
            prefix: /ingest
      route:
        - destination:
            host: analytics
            subset: stable
      timeout: 5s
      retries:
        attempts: 2
        perTryTimeout: 2s
        retryOn: 5xx,reset

    # ── Query / dashboard endpoint — longer timeout ───────────────────────────
    - match:
        - uri:
            prefix: /query
      route:
        - destination:
            host: analytics
            subset: stable
      timeout: 60s

    # ── Default ───────────────────────────────────────────────────────────────
    - route:
        - destination:
            host: analytics
            subset: stable
      timeout: 30s

---
# ── Stellar RPC Egress ────────────────────────────────────────────────────────
# Route outbound Stellar Horizon / Soroban RPC calls through the egress gateway
# for audit logging and policy control.
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: stellar-rpc-egress
  namespace: gistpin
spec:
  hosts:
    - horizon.stellar.org
    - soroban-testnet.stellar.org
  gateways:
    - mesh
  http:
    - route:
        - destination:
            host: istio-egressgateway.istio-system.svc.cluster.local
            port:
              number: 443
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure,5xx