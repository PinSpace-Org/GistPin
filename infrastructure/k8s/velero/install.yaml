apiVersion: v1
kind: Namespace
metadata:
  name: velero
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero
  namespace: velero
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: velero
    namespace: velero
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero
  namespace: velero
  labels:
    component: velero
spec:
  replicas: 1
  selector:
    matchLabels:
      component: velero
  template:
    metadata:
      labels:
        component: velero
    spec:
      serviceAccountName: velero
      containers:
        - name: velero
          image: velero/velero:v1.14.0
          imagePullPolicy: IfNotPresent
          command:
            - /velero
          args:
            - server
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /credentials/cloud
            - name: VELERO_SCRATCH_DIR
              value: /scratch
            - name: VELERO_NAMESPACE
              value: velero
          volumeMounts:
            - name: cloud-credentials
              mountPath: /credentials
              readOnly: true
            - name: scratch
              mountPath: /scratch
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: cloud-credentials
          secret:
            secretName: velero-cloud-credentials
        - name: scratch
          emptyDir: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: velero-cloud-credentials
  namespace: velero
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id=CHANGEME
    aws_secret_access_key=CHANGEME
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: velero-restic-config
  namespace: velero
data:
  resticTimeout: "4h"
  resticProgressCheckInterval: "1m"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: restic
  namespace: velero
  labels:
    component: restic
spec:
  selector:
    matchLabels:
      name: restic
  template:
    metadata:
      labels:
        name: restic
    spec:
      serviceAccountName: velero
      hostPID: true
      containers:
        - name: restic
          image: velero/velero:v1.14.0
          imagePullPolicy: IfNotPresent
          command:
            - /velero
          args:
            - restic
            - server
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /credentials/cloud
            - name: VELERO_NAMESPACE
              value: velero
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: cloud-credentials
              mountPath: /credentials
              readOnly: true
            - name: host-pods
              mountPath: /host_pods
              readOnly: true
            - name: scratch
              mountPath: /scratch
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: cloud-credentials
          secret:
            secretName: velero-cloud-credentials
        - name: host-pods
          hostPath:
            path: /var/lib/kubelet/pods
        - name: scratch
          emptyDir: {}
