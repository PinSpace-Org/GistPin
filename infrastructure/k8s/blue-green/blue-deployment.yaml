apiVersion: apps/v1
kind: Deployment
metadata:
  name: gistpin-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gistpin
      version: blue
  template:
    metadata:
      labels:
        app: gistpin
        version: blue
    spec:
      containers:
        - name: gistpin
          image: gistpin:blue
          ports:
            - containerPort: 3000
