apiVersion: apps/v1
kind: Deployment
metadata:
  name: gistpin-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gistpin
      version: green
  template:
    metadata:
      labels:
        app: gistpin
        version: green
    spec:
      containers:
        - name: gistpin
          image: gistpin:green
          ports:
            - containerPort: 3000
