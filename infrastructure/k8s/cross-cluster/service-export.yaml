# infrastructure/k8s/cross-cluster/service-export.yaml
# MCS API service exports for GistPin cross-cluster discovery
# Covers: ServiceExport, ServiceImport, and example exports per service

---
# ServiceExport CRD (MCS API - multicluster.x-k8s.io)
# Install this CRD on every member cluster
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: serviceexports.multicluster.x-k8s.io
  labels:
    app.kubernetes.io/managed-by: submariner
spec:
  group: multicluster.x-k8s.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
  scope: Namespaced
  names:
    plural: serviceexports
    singular: serviceexport
    kind: ServiceExport
    shortNames:
      - svcex

---
# ServiceImport CRD
# Automatically created by Lighthouse on consuming clusters;
# included here for reference and manual override scenarios
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: serviceimports.multicluster.x-k8s.io
  labels:
    app.kubernetes.io/managed-by: submariner
spec:
  group: multicluster.x-k8s.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                type:
                  type: string
                  enum: [ClusterSetIP, Headless]
                ports:
                  type: array
                  items:
                    type: object
                ips:
                  type: array
                  items:
                    type: string
            status:
              type: object
      subresources:
        status: {}
  scope: Namespaced
  names:
    plural: serviceimports
    singular: serviceimport
    kind: ServiceImport
    shortNames:
      - svcim

---
# Export the GistPin API service so other clusters can reach it
# DNS: gistpin-api.gistpin.svc.clusterset.local
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: gistpin-api
  namespace: gistpin
  labels:
    app: gistpin-api
    app.kubernetes.io/part-of: gistpin

---
# Export the auth service
# DNS: gistpin-auth.gistpin.svc.clusterset.local
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: gistpin-auth
  namespace: gistpin
  labels:
    app: gistpin-auth
    app.kubernetes.io/part-of: gistpin

---
# Export the gist storage service
# DNS: gistpin-storage.gistpin.svc.clusterset.local
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: gistpin-storage
  namespace: gistpin
  labels:
    app: gistpin-storage
    app.kubernetes.io/part-of: gistpin

---
# Export the notification service
# DNS: gistpin-notifications.gistpin.svc.clusterset.local
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: gistpin-notifications
  namespace: gistpin
  labels:
    app: gistpin-notifications
    app.kubernetes.io/part-of: gistpin

---
# Headless ServiceImport example -- for stateful workloads (e.g. Postgres replicas)
# that need per-pod DNS across clusters rather than a single VIP
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceImport
metadata:
  name: gistpin-db
  namespace: gistpin
  labels:
    app: gistpin-db
    app.kubernetes.io/part-of: gistpin
spec:
  type: Headless
  ports:
    - name: postgres
      port: 5432
      protocol: TCP

---
# NetworkPolicy: allow cross-cluster ingress to exported services
# Submariner gateway pods are in submariner-operator namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cross-cluster-ingress
  namespace: gistpin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: gistpin
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: submariner-operator
      ports:
        - protocol: TCP
          port: 8080    # API / HTTP
        - protocol: TCP
          port: 8443    # HTTPS
        - protocol: TCP
          port: 5432    # Postgres
        - protocol: TCP
          port: 6379    # Redis
