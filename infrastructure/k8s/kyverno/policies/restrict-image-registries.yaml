apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict image registries
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: Allows only approved container registries.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - Job
                - CronJob
      validate:
        message: "Only ghcr.io and docker.io images are allowed."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ images.containers.{{element}}.registry }}"
                    operator: NotIn
                    value:
                      - ghcr.io
                      - docker.io
          - list: "request.object.spec.initContainers"
            deny:
              conditions:
                any:
                  - key: "{{ images.initContainers.{{element}}.registry }}"
                    operator: NotIn
                    value:
                      - ghcr.io
                      - docker.io
