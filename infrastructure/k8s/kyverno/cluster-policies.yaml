# Aggregated Kyverno policy bundle for GistPin.
# Apply this after installing the Kyverno controller.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-gistpin-labels
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-app-label
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - Job
                - CronJob
      validate:
        message: "The app.kubernetes.io/name label is required."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
    - name: require-part-of-label
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - Job
                - CronJob
      validate:
        message: "The app.kubernetes.io/part-of label is required."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/part-of: "?*"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - Job
                - CronJob
      validate:
        message: "Only ghcr.io and docker.io images are allowed."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ images.containers.{{element}}.registry }}"
                    operator: NotIn
                    value:
                      - ghcr.io
                      - docker.io
          - list: "request.object.spec.initContainers"
            deny:
              conditions:
                any:
                  - key: "{{ images.initContainers.{{element}}.registry }}"
                    operator: NotIn
                    value:
                      - ghcr.io
                      - docker.io
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - Job
                - CronJob
      validate:
        message: "Every container must define requests and limits for CPU and memory."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.resources.requests.cpu || '' }}"
                    operator: Equals
                    value: ""
                  - key: "{{ element.resources.requests.memory || '' }}"
                    operator: Equals
                    value: ""
                  - key: "{{ element.resources.limits.cpu || '' }}"
                    operator: Equals
                    value: ""
                  - key: "{{ element.resources.limits.memory || '' }}"
                    operator: Equals
                    value: ""
