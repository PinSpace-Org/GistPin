apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kyverno
  namespace: kyverno
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-admin
rules:
  - apiGroups: [""]
    resources: ["events", "configmaps", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps", "batch", "networking.k8s.io"]
    resources: ["deployments", "statefulsets", "jobs", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kyverno.io"]
    resources: ["clusterpolicies", "policies", "clusterpolicyreports", "policyreports"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-admin
subjects:
  - kind: ServiceAccount
    name: kyverno
    namespace: kyverno
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kyverno-config
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno
    app.kubernetes.io/part-of: kyverno
data:
  validateFailureAction: Audit
  backgroundScan: "true"
  webhooksCleanup: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyverno
  namespace: kyverno
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kyverno
  template:
    metadata:
      labels:
        app: kyverno
    spec:
      serviceAccountName: kyverno
      containers:
        - name: kyverno
          image: ghcr.io/kyverno/kyverno:v1.13.0
          args:
            - --backgroundServiceAccount=kyverno
            - --enableConfigMapCaching=false
          ports:
            - containerPort: 9443
              name: https
          env:
            - name: KYVERNO_NAMESPACE
              value: kyverno
---
apiVersion: v1
kind: Service
metadata:
  name: kyverno
  namespace: kyverno
spec:
  selector:
    app: kyverno
  ports:
    - name: https
      port: 443
      targetPort: 9443
