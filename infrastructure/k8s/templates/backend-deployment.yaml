{{- if .Values.backend.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gistpin.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gistpin.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with .Values.backend.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gistpin.componentSelectorLabels" (dict "component" "backend" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gistpin.componentSelectorLabels" (dict "component" "backend" "root" .) | nindent 8 }}
      {{- with .Values.backend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with (default .Values.global.imagePullSecrets list) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gistpin.serviceAccountName" . }}
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          {{- with .Values.backend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: {{ include "gistpin.fullname" . }}-backend-config
          # Sensitive values from Secret
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gistpin.backendSecretName" . }}
                  key: DATABASE_PASSWORD
            - name: PINATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gistpin.backendSecretName" . }}
                  key: PINATA_API_KEY
            - name: PINATA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gistpin.backendSecretName" . }}
                  key: PINATA_SECRET_KEY
            - name: STELLAR_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gistpin.backendSecretName" . }}
                  key: STELLAR_SECRET_KEY
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}