apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: gistpin
spec:
  template:
    spec:
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: postgres
