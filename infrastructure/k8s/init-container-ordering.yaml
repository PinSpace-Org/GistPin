apiVersion: v1
kind: ConfigMap
metadata:
  name: init-container-scripts
  namespace: gistpin
data:
  wait-for-db.sh: |
    #!/bin/sh
    until pg_isready -h postgres-service -p 5432; do
      echo "Waiting for database..."
      sleep 2
    done
    echo "Database is ready."
  wait-for-redis.sh: |
    #!/bin/sh
    until redis-cli -h redis-service ping | grep -q PONG; do
      echo "Waiting for redis..."
      sleep 2
    done
    echo "Redis is ready."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gistpin-backend
  namespace: gistpin
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gistpin-backend
  template:
    metadata:
      labels:
        app: gistpin-backend
    spec:
      initContainers:
        - name: init-db-check
          image: postgres:16-alpine
          command: ["sh", "/scripts/wait-for-db.sh"]
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
        - name: init-redis-check
          image: redis:7-alpine
          command: ["sh", "/scripts/wait-for-redis.sh"]
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
        - name: init-migrations
          image: gistpin/migrate:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: database_url
      containers:
        - name: backend
          image: gistpin/backend:latest
          ports:
            - containerPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gistpin-backend-hpa
  namespace: gistpin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gistpin-backend
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
