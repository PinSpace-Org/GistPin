apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-policy
  namespace: gistpin-prod
spec:
  podSelector:
    matchLabels:
      app: gistpin-backend
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gistpin-frontend
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
  policyTypes:
    - Ingress
    - Egress
